name: Deploy Site

# One deployment per client. The branch name = client slug = APP_NAME = GitHub Environment name =
# infra folder apps/sites/<slug>/ = image name = subdomain. Per-client config lives in the
# Environment named exactly like the branch (alvorada-imoveis). `main` and dev branches
# (fix/..., feat/... — anything with a "/") do NOT deploy.
#
# Image → GHCR (ghcr.io/<owner>/<slug>), tags :latest + :<sha>. The EC2 runs the exact sha via
# IMAGE_TAG. Rollback: run this workflow from the branch with rollback_tag = an older sha.

on:
  push:
    branches:
      - "*"
      - "!main"
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: "Image tag/sha to redeploy (rollback). Leave empty for a normal build."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # The Environment named after the branch supplies this client's secrets/variables.
    environment: ${{ github.ref_name }}

    env:
      APP_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image ref + deploy tag
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/$OWNER_LC/$APP_NAME" >> "$GITHUB_ENV"
          DEPLOY_TAG="${{ github.event.inputs.rollback_tag }}"
          [ -n "$DEPLOY_TAG" ] || DEPLOY_TAG="${{ github.sha }}"
          echo "DEPLOY_TAG=$DEPLOY_TAG" >> "$GITHUB_ENV"

      - name: Log in to GHCR (push)
        if: ${{ github.event_name == 'push' || github.event.inputs.rollback_tag == '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: ${{ github.event_name == 'push' || github.event.inputs.rollback_tag == '' }}
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_APP_NAME="${{ secrets.NEXT_PUBLIC_APP_NAME }}" \
            --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}" \
            --build-arg NEXT_PUBLIC_TENANT_SLUG="${{ secrets.NEXT_PUBLIC_TENANT_SLUG }}" \
            --build-arg NEXT_PUBLIC_TENANT_ID="${{ secrets.NEXT_PUBLIC_TENANT_ID }}" \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${{ github.sha }}" \
            .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"

      - name: Deploy on EC2 (pull + up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          envs: APP_NAME,DEPLOY_TAG
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            cd ~/timemob-infra/apps/sites/$APP_NAME
            export IMAGE_TAG="$DEPLOY_TAG"
            docker compose pull
            docker compose up -d
            docker image prune -f
